<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeavenlyCihuy</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="top-right">
    <div id="clock">00:00</div>
    <button id="soundBtn"><i class="fa-solid fa-volume-xmark"></i></button>
</div>

<main class="card">
    <div class="glow"></div>

    <div class="avatar"><img src="profile.png" alt="Profile"></div>

    <div class="status">
        <span class="dot"></span>
        Available
    </div>

    <h1>HeavenlyCihuy</h1>
    <p class="subtitle">Website Developer</p>

    <div class="socials">

        <a href="https://www.youtube.com/@bedwarsahuy177" target="_blank" class="btn youtube">
            <i class="fa-brands fa-youtube"></i>
            <span>YouTube</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://www.roblox.com/users/3437568263/profile?friendshipSourceType=PlayerSearch" target="_blank" class="btn roblox">
            <i class="fa-solid fa-cube"></i>
            <span>Roblox</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://www.tiktok.com/@uziii666v?_r=1&_t=ZS-97l5KcTjmLA" target="_blank" class="btn tiktok">
            <i class="fa-brands fa-tiktok"></i>
            <span>TikTok</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://discord.com/users/834352816931471360" target="_blank" class="btn discord">
            <i class="fa-brands fa-discord"></i>
            <span>Discord</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

    </div>

    <div class="footer">
        Made with ❤️ by <strong>HeavenlyCihuy</strong>
    </div>
</main>

<div class="particles">
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
</div>

<script src="script.js"></script>
</body>
</html>
